# Example Nginx config for C-by-AI Meal API (Laravel)
# Copy to /etc/nginx/sites-available/your-app and fix paths + server_name.
# Then: sudo nginx -t && sudo systemctl reload nginx
# Fixes 504 Gateway Time-out for long-running generate-meals and SSE stream.

server {
    listen 80;
    server_name your-domain.com;
    root /var/www/your-app/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Prevent 504 for long-running API (meal generation 1–3+ min, SSE stream)
        fastcgi_read_timeout 1800;
        fastcgi_send_timeout 1800;
        fastcgi_connect_timeout 60;
        fastcgi_buffering off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
